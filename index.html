<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>FFCS Planner</title>

  <style>
    #grid {
      display: grid;
      grid-template-columns: 80px repeat(12, 80px);
      gap: 2px;
    }

    .cell {
      border: 1px solid black;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      text-align: center;
    }

    .cell:hover {
      background-color: #fffbfb;
    }

    .filled {
      font-weight: bold;
    }

    #popover {
      position: absolute;
      display: none;
      border-radius: 5px;
      background: white;
      padding: 8px;
      z-index: 1000;
      box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.4);
    }

    #matrixContainer {
      margin-top: 12px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 500px;
    }

    td,
    th {
      border: 1px solid #ccc;
      padding: 6px;
      font-size: 13px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <div id="popover"></div>
  <div id="grid"></div>
  <audio class="sound-bite" src="faa.mp3"></audio>

  <button id="toggleMatrix">Toggle Subjects</button>

  <div id="matrixContainer">
    <table id="matrix">
      <thead>
        <tr>
          <th>Subject</th>
          <th>Teacher</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let slotGroups = {};
    let cellToSlotGroups = {};
    let occupied = {};
    let selectedGroups = {};
    let cellLabels = {};
    let teacherData = {};

    const popover = document.getElementById("popover");

    const colors = [
      "#ffb3ba", "#baffc9", "#bae1ff",
      "#ffffba", "#ffdfba", "#c9c9ff"
    ];

    function getColor(group) {
      let hash = 0;
      for (let i = 0; i < group.length; i++) {
        hash += group.charCodeAt(i);
      }
      return colors[hash % colors.length];
    }

    function isAtomic(group) {
      return !group.includes('+');
    }

    // ---------- COMBINATIONS ----------

    function generateTheoryCombos(slotGroups) {
      const newGroups = {};

      for (const group in slotGroups) {
        const match = group.match(/^([A-Z]+)(\d)$/);
        if (!match) continue;

        const [_, prefix, num] = match;

        const base = `${prefix}${num}`;
        const ta = `T${prefix}${num}`;
        const taa = `T${prefix}${prefix}${num}`;

        if (slotGroups[base] && slotGroups[ta]) {
          newGroups[`${base}+${ta}`] = [
            ...slotGroups[base],
            ...slotGroups[ta]
          ];
        }

        if (slotGroups[base] && slotGroups[ta] && slotGroups[taa]) {
          newGroups[`${base}+${ta}+${taa}`] = [
            ...slotGroups[base],
            ...slotGroups[ta],
            ...slotGroups[taa]
          ];
        }
      }

      return newGroups;
    }

    function generateLabCombos(slotGroups) {
      const newGroups = {};

      for (const group in slotGroups) {
        const match = group.match(/^L(\d+)$/);
        if (!match) continue;

        const n = parseInt(match[1]);

        let pair;
        if (n % 2 === 0) {
          pair = [`L${n - 1}`, `L${n}`];
        } else {
          pair = [`L${n}`, `L${n + 1}`];
        }

        if (slotGroups[pair[0]] && slotGroups[pair[1]]) {
          newGroups[`${pair[0]}+${pair[1]}`] = [
            ...slotGroups[pair[0]],
            ...slotGroups[pair[1]]
          ];
        }
      }

      return newGroups;
    }

    // ---------- INIT ----------

    fetch('slotGroups.json')
      .then(res => res.json())
      .then(data => {
        slotGroups = data;

        slotGroups = {
          ...slotGroups,
          ...generateTheoryCombos(slotGroups),
          ...generateLabCombos(slotGroups)
        };

        for (const group in slotGroups) {
          for (const cell of slotGroups[group]) {
            if (!cellToSlotGroups[cell]) {
              cellToSlotGroups[cell] = new Set();
            }
            cellToSlotGroups[cell].add(group);
          }
        }

        buildGrid();
        initializeGrid();
      });

    // ---------- GRID ----------

    function buildGrid() {
      const days = ["mon", "tue", "wed", "thu", "fri"];
      const periods = Array.from({ length: 12 }, (_, i) => i + 1);

      const grid = document.getElementById("grid");

      grid.appendChild(document.createElement("div"));

      periods.forEach(p => {
        const el = document.createElement("div");
        el.innerText = "P" + p;
        el.style.fontWeight = "bold";
        grid.appendChild(el);
      });

      days.forEach(day => {
        const dayLabel = document.createElement("div");
        dayLabel.innerText = day.toUpperCase();
        dayLabel.style.fontWeight = "bold";
        grid.appendChild(dayLabel);

        periods.forEach(p => {
          const cellId = `${day}_p${p}`;
          const cell = document.createElement("div");

          cell.className = "cell";
          cell.dataset.cell = cellId;

          const groups = Array.from(cellToSlotGroups[cellId] || []);
          const label = groups.filter(isAtomic).sort().join('/');

          cell.innerText = label;
          cellLabels[cellId] = label;

          grid.appendChild(cell);
        });
      });
    }

    // ---------- INTERACTION ----------

    function initializeGrid() {
      const cells = document.querySelectorAll(".cell");

      cells.forEach(cell => {
        cell.onclick = () => {
          const cellId = cell.dataset.cell;
          const group = occupied[cellId];

          if (group) {
            removeGroup(group);
            return;
          }

          const rect = cell.getBoundingClientRect();

          popover.style.top = rect.bottom + window.scrollY + "px";
          popover.style.left = rect.left + window.scrollX + "px";
          popover.style.display = "block";

          const options = Array.from(cellToSlotGroups[cellId] || []);
          renderOptions(options, cellId);
        };
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".cell") && !e.target.closest("#popover")) {
          popover.style.display = "none";
        }
      });
    }

    function selectGroup(group, subject) {
      const cellsToFill = slotGroups[group];
      const conflictCells = [];

      for (const cell of cellsToFill) {
        if (occupied[cell] && occupied[cell] !== group) {
          conflictCells.push(cell);
        }
      }

      if (conflictCells.length > 0) {
        // Popover feedback
        console.log('hi');
        const soundBite = document.querySelector(".sound-bite");
        soundBite.currentTime = 0;
        soundBite.play();
        
        popover.style.boxShadow = "0 0 10px rgba(255,0,0,0.8)";
        popover.style.border = "1px solid red";

        // Cell highlight
        conflictCells.forEach(cell => {
          const el = document.querySelector(`[data-cell="${cell}"]`);
          if (!el) return;

          const prev = el.style.background;
          el.style.background = "rgba(255,0,0,0.6)";

          setTimeout(() => {
            el.style.background = prev || "";
          }, 400);
        });

        // Reset popover style
        setTimeout(() => {
          popover.style.boxShadow = "0px 0px 5px rgba(0,0,0,0.4)";
          popover.style.border = "";
        }, 400);

        return;
      }

      selectedGroups[group] = subject || true;

      for (const cell of cellsToFill) {
        occupied[cell] = group;

        const el = document.querySelector(`[data-cell="${cell}"]`);
        if (el) {
          el.classList.add("filled");
          el.style.background = getColor(group);
          el.innerText = subject || group;
        }
      }

      renderMatrix();
      popover.style.display = "none";
    }

    function removeGroup(group) {
      delete selectedGroups[group];
      delete teacherData[group];

      for (const cell of slotGroups[group]) {
        delete occupied[cell];

        const el = document.querySelector(`[data-cell="${cell}"]`);
        if (el) {
          el.classList.remove("filled");
          el.style.background = "";
          el.innerText = cellLabels[cell];
        }
      }

      renderMatrix();
      popover.style.display = "none";
    }

    function isSingleLab(group) {
      return /^L\d+$/.test(group);
    }
    
    function sortGroups(groups) {
      return groups.sort((a, b) => {
        const aIsLab = a.startsWith("L");
        const bIsLab = b.startsWith("L");

        // theory first
        if (aIsLab !== bIsLab) return aIsLab ? 1 : -1;

        // LAB sorting
        if (aIsLab && bIsLab) {
          const aNum = parseInt(a.match(/\d+/)[0]);
          const bNum = parseInt(b.match(/\d+/)[0]);
          return aNum - bNum;
        }

        // THEORY sorting
        const getBase = g => g.split("+")[0];
        const getLevel = g => g.split("+").length;

        const aBase = getBase(a);
        const bBase = getBase(b);

        if (aBase !== bBase) return aBase.localeCompare(bBase);

        return getLevel(a) - getLevel(b);
      });
    }

    function renderOptions(options, cellId) {
      popover.innerHTML = "";

      // ❌ remove single labs
      let filtered = options.filter(g => !isSingleLab(g));

      // ✅ sort properly
      filtered = sortGroups(filtered);

      const input = document.createElement("input");
      input.placeholder = "Subject (optional)";
      input.style.marginBottom = "8px";

      popover.appendChild(input);

      filtered.forEach(group => {
        const btn = document.createElement("div");
        btn.innerText = group;
        btn.style.padding = "6px";
        btn.style.cursor = "pointer";

        btn.onclick = () => selectGroup(group, input.value.trim());

        popover.appendChild(btn);
      });
    }

    // ---------- MATRIX ----------

    function renderMatrix() {
      const tbody = document.querySelector("#matrix tbody");
      tbody.innerHTML = "";

      for (const group in selectedGroups) {
        const row = document.createElement("tr");

        const subjectCell = document.createElement("td");
        const subject = selectedGroups[group];
        subjectCell.innerText = subject === true ? group : subject;

        const teacherCell = document.createElement("td");
        const input = document.createElement("input");

        input.value = teacherData[group] || "";

        input.oninput = (e) => {
          teacherData[group] = e.target.value;
        };

        teacherCell.appendChild(input);

        row.appendChild(subjectCell);
        row.appendChild(teacherCell);

        tbody.appendChild(row);
      }
    }

    // ---------- TOGGLE ----------

    const toggleBtn = document.getElementById("toggleMatrix");
    const matrixContainer = document.getElementById("matrixContainer");

    toggleBtn.onclick = () => {
      matrixContainer.style.display =
        matrixContainer.style.display === "none" ? "block" : "none";
    };

  </script>

</body>

</html>
